<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一一助手 · 登录</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: #07070d;
  color: #e8e8ed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  width: 340px;
  padding: 40px 32px;
  background: rgba(18,18,26,0.85);
  border: 1px solid rgba(34,34,46,0.6);
  border-radius: 16px;
  text-align: center;
}
.logo {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg,#fe2c55,#9333ea);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  margin: 0 auto 16px;
  box-shadow: 0 4px 12px rgba(254,44,85,0.3);
}
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 12px; color: #63636e; margin-bottom: 28px; }
.input-group { margin-bottom: 14px; text-align: left; }
.input-group label { font-size: 11px; color: #63636e; margin-bottom: 4px; display: block; }
.input-group input {
  width: 100%;
  padding: 10px 14px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(34,34,46,0.6);
  border-radius: 8px;
  font-size: 14px;
  color: #e8e8ed;
  outline: none;
  font-family: inherit;
}
.input-group input:focus { border-color: rgba(254,44,85,0.3); }
.btn-login {
  width: 100%;
  padding: 10px;
  background: #fe2c55;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  margin-top: 6px;
}
.btn-login:hover { background: #e0274c; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #ef4444; font-size: 12px; margin-top: 10px; display: none; }
.loading { display: none; font-size: 12px; color: #63636e; margin-top: 10px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">一</div>
  <h1>一一助手</h1>
  <div class="sub">抖音多账号直播间评论工具</div>
  <div class="input-group">
    <label>用户名</label>
    <input id="username" type="text" placeholder="admin" />
  </div>
  <div class="input-group">
    <label>密码</label>
    <input id="password" type="password" placeholder="默认 admin" onkeydown="if(event.key==='Enter') doLogin()" />
  </div>
  <button class="btn-login" id="btnLogin" onclick="doLogin()">登 录</button>
  <div class="loading" id="loading">登录中...</div>
  <div class="error" id="error">账号或密码错误</div>
</div>
<script>
async function doLogin() {
  const u = document.getElementById('username').value.trim() || 'admin';
  const p = document.getElementById('password').value.trim() || 'admin';
  const btn = document.getElementById('btnLogin');
  const loading = document.getElementById('loading');
  const err = document.getElementById('error');
  btn.disabled = true; loading.style.display = 'block'; err.style.display = 'none';
  try {
    const r = await fetch('http://localhost:3456/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await r.json();
    if (data.success) {
      localStorage.setItem('nb_login', 'true');
      window.location.href = '/';
    } else {
      err.textContent = data.error || '账号或密码错误';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = '连接服务器失败: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false; loading.style.display = 'none';
}
</script>
</body>
</html>
